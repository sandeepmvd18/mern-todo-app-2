name: Daily Dummy Commit

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dummy-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Create/Update Dummy File
      run: |
        echo "Automated dummy commit - $(date)" >> DUMMY_COMMIT.txt

    - name: Commit and Push Changes
      run: |
        git config --global user.name "sandeepmvd18"
        git config --global user.email "sandeepmvd18@outlook.com"
        git add DUMMY_COMMIT.txt
        git commit -m "Daily dummy commit - $(date)" || echo "No changes to commit"
        git push
